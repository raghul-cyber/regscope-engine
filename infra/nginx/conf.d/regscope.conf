# HTTP → HTTPS redirect
server {
    listen 80;
    server_name regscope.yourdomain.com www.regscope.yourdomain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name regscope.yourdomain.com;

    ssl_certificate /etc/letsencrypt/live/regscope.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/regscope.yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Frontend
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Cache Next.js static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
            proxy_pass http://frontend:3000;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Backend API
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeout for pipeline operations
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;

        # Specific rate limits for heavy endpoints
        location /api/v1/crawl {
            limit_req zone=crawl_limit burst=3 nodelay;
            proxy_pass http://backend:8000;
            proxy_read_timeout 60s;
        }

        location /api/v1/search {
            limit_req zone=search_limit burst=10 nodelay;
            proxy_pass http://backend:8000;
            proxy_read_timeout 30s;
        }

        location /api/v1/export {
            proxy_pass http://backend:8000;
            proxy_read_timeout 600s;  # Large exports take time
            proxy_buffering off;       # Stream response
        }
    }

    # FastAPI docs (restrict to internal / admin IPs in production)
    location /docs {
        allow 127.0.0.1;
        # allow YOUR.OFFICE.IP.ADDRESS;
        deny all;
        proxy_pass http://backend:8000;
    }

    location /redoc {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://backend:8000;
    }

    # Flower (Celery monitor) — admin only
    location /flower/ {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://flower:5555/;
        proxy_set_header Host $host;
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health endpoint (always public, no rate limit)
    location /health {
        proxy_pass http://backend:8000/health;
        access_log off;
    }

    client_max_body_size 50M;  # For PDF uploads
}
