name: Sync to Hugging Face

on:
  push:
    branches: [main]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # Replace your-hf-username below with your actual Hugging Face username!
        run: git push --force https://raghul-cyber:$HF_TOKEN@huggingface.co/spaces/raghul-cyber/regscope-backend main
